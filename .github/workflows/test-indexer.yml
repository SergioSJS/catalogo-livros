name: Test Indexer

on:
  push:
    paths: ['indexer/**']
  pull_request:
    paths: ['indexer/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: indexer

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing -v
        working-directory: indexer
        env:
          DATABASE_PATH: /tmp/catalog-test.db
