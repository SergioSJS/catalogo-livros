name: Build & Push Docker Images

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push indexer
        uses: docker/build-push-action@v6
        with:
          context: ./indexer
          push: true
          tags: |
            ghcr.io/sergiojs/catalogo-livros/indexer:latest
            ghcr.io/sergiojs/catalogo-livros/indexer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push catalog site
        uses: docker/build-push-action@v6
        with:
          context: ./catalog-site
          push: true
          tags: |
            ghcr.io/sergiojs/catalogo-livros/catalog:latest
            ghcr.io/sergiojs/catalogo-livros/catalog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
