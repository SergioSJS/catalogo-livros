name: Build & Push Docker Images

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix
        id: vars
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push indexer
        uses: docker/build-push-action@v6
        with:
          context: ./indexer
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/indexer:latest
            ${{ steps.vars.outputs.prefix }}/indexer:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push catalog site
        uses: docker/build-push-action@v6
        with:
          context: ./catalog-site
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/catalog:latest
            ${{ steps.vars.outputs.prefix }}/catalog:${{ github.sha }}
          build-args: |
            VITE_APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
