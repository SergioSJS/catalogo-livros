server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Thumbnails served from shared volume with long cache
    location /thumbnails/ {
        alias /data/thumbnails/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the indexer
    location /api/ {
        proxy_pass http://rpg-indexer:8564;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
