<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Catalog</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232d5016'/%3E%3Crect x='7' y='6' width='13' height='20' rx='2' fill='%23c5913e'/%3E%3Crect x='8' y='7' width='11' height='18' rx='1' fill='%23f5f0e8'/%3E%3Crect x='10' y='10' width='7' height='1.5' rx='.5' fill='%232d5016'/%3E%3Crect x='10' y='13' width='7' height='1.5' rx='.5' fill='%232d5016'/%3E%3Crect x='10' y='16' width='5' height='1.5' rx='.5' fill='%232d5016'/%3E%3Crect x='21' y='6' width='3' height='20' rx='1' fill='%23a07030'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', system-ui, sans-serif; background: #f5f4f0; color: #222; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Header ─────────────────────────────────────────────────── */
    .site-header {
      background: #2d5016;
      color: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-row1 {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 24px;
    }
    .header-logo {
      font-family: 'Cinzel', serif;
      font-size: 19px; font-weight: 700;
      letter-spacing: .5px; white-space: nowrap;
      flex-shrink: 0;
    }
    .header-search-wrap { flex: 1; min-width: 0; }
    .header-row2 { display: none; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout { display: flex; gap: 0; max-width: 1440px; margin: 0 auto; }
    .sidebar {
      width: 248px; flex-shrink: 0;
      padding: 20px 16px 40px;
      border-right: 1px solid #e2e0da;
      min-height: calc(100vh - 56px);
    }
    .main { flex: 1; min-width: 0; padding: 20px 24px 40px; }

    /* ── Toolbar ────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar-count { font-size: 13px; color: #777; }
    .sort-wrap { display: flex; align-items: center; gap: 8px; }
    .sort-label { font-size: 13px; color: #666; }
    .sort-select {
      font-size: 13px; padding: 5px 10px; border-radius: 8px;
      border: 1px solid #d8d6d0; background: #fff; cursor: pointer;
      color: #333;
    }

    /* ── Book Grid ──────────────────────────────────────────────── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
      gap: 16px;
    }
    .book-card {
      background: #fff; border-radius: 12px;
      border: 1px solid #e8e6e0;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      cursor: pointer; text-align: left;
      transition: box-shadow .15s, transform .15s;
      overflow: hidden;
      display: flex; flex-direction: column;
      animation: fadeIn .2s ease;
    }
    .book-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); transform: translateY(-2px); }
    .book-card:active { transform: translateY(0); }
    .card-thumb-wrap { position: relative; }
    .card-thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
    .card-lang {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.6); color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 6px; border-radius: 4px;
    }
    .card-score-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.65); color: #c5913e;
      font-size: 13px; letter-spacing: 1px;
      padding: 6px 8px; text-align: center;
      opacity: 0; transition: opacity .18s ease;
      pointer-events: none;
    }
    .card-thumb-wrap:hover .card-score-overlay { opacity: 1; }
    .card-body { padding: 10px 10px 8px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-title { font-size: 13px; font-weight: 600; line-height: 1.3; color: #1a1a1a; }
    .card-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-top: auto; }
    .tag-pill {
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; white-space: nowrap;
    }
    .tag-system { background: #2d5016; color: #fff; }
    .tag-category { background: #c5913e22; color: #7a5520; border: 1px solid #c5913e44; }
    .tag-genre { background: #1a3a6e22; color: #1a3a6e; border: 1px solid #1a3a6e33; }
    .card-pages { font-size: 11px; color: #999; margin-left: auto; }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar-section { margin-bottom: 20px; }
    .sidebar-heading {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 8px;
      display: block;
    }
    .sidebar-heading-btn {
      width: 100%; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 0; margin-bottom: 6px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #888; text-align: left;
    }
    .sidebar-heading-btn:hover { color: #555; }
    .sidebar-heading-caret { font-size: 9px; }
    .facet-item {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0; cursor: pointer; font-size: 13px;
      border-radius: 6px; transition: background .1s;
    }
    .facet-item:hover { background: #f0ede6; }
    .facet-item input { accent-color: #2d5016; cursor: pointer; flex-shrink: 0; }
    .facet-name { flex: 1; color: #333; }
    .facet-count { font-size: 11px; color: #aaa; }
    .facet-active .facet-name { color: #2d5016; font-weight: 600; }
    .facet-excluded { opacity: .85; }
    .facet-excluded .facet-name { color: #c0392b; font-weight: 600; text-decoration: line-through; }
    .facet-excluded input { accent-color: #c0392b; }
    .facet-exclude-icon { font-size: 10px; color: #c0392b; font-weight: 700; }
    .sidebar-reset {
      font-size: 12px; color: #c5913e; background: none; border: none;
      cursor: pointer; text-decoration: underline; padding: 0;
    }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .sidebar-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #2d5016; }

    /* ── Indexing Panel (header-native) ─────────────────────────── */
    .index-btn {
      padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 700; font-size: 13px; white-space: nowrap;
      background: #c5913e; color: #fff;
      transition: background .15s;
    }
    .index-btn:hover:not(:disabled) { background: #b07c2e; }
    .index-btn:disabled { background: rgba(255,255,255,.2); color: rgba(255,255,255,.7); cursor: default; }
    .index-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
    .index-phase { font-size: 11px; color: rgba(255,255,255,.7); text-align: center; }
    .index-bar-track { height: 3px; background: rgba(255,255,255,.25); border-radius: 2px; overflow: hidden; }
    .index-bar-fill { height: 100%; background: #c5913e; border-radius: 2px; transition: width .3s; }

    /* ── Filter toggle (mobile) ─────────────────────────────────── */
    .filter-toggle {
      display: none; align-items: center; gap: 6px;
      background: rgba(255,255,255,.15); color: #fff;
      border: 1px solid rgba(255,255,255,.3); border-radius: 8px;
      padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 300;
    }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 288px; background: #fff; z-index: 301;
      padding: 0; overflow-y: auto;
      box-shadow: 4px 0 32px rgba(0,0,0,.2);
    }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #eee;
      background: #2d5016; color: #fff;
    }
    .drawer-title { font-family: 'Cinzel', serif; font-size: 15px; }
    .drawer-close {
      background: none; border: none; color: #fff; font-size: 22px;
      cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .drawer-body { padding: 16px; }

    /* ── Pagination ──────────────────────────────────────────────── */
    .pagination { display: flex; align-items: center; gap: 8px; justify-content: center; padding: 24px 0 8px; }
    .page-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid #d8d6d0;
      background: #fff; cursor: pointer; font-size: 13px; color: #333;
      transition: background .1s;
    }
    .page-btn:hover:not(:disabled) { background: #f0ede6; }
    .page-btn:disabled { color: #ccc; cursor: default; }
    .page-info { font-size: 13px; color: #666; min-width: 80px; text-align: center; }

    /* ── Search ─────────────────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 8px 36px 8px 14px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.15); color: #fff;
      font-size: 14px; outline: none;
      transition: background .15s, border-color .15s;
    }
    .search-input::placeholder { color: rgba(255,255,255,.6); }
    .search-input:focus { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.7); font-size: 18px; line-height: 1;
    }

    /* ── Modal ───────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 400; padding: 16px;
    }
    .modal-box {
      background: #fff; border-radius: 16px;
      max-width: 640px; width: 100%; max-height: 90vh;
      overflow-y: auto; position: relative;
      animation: fadeIn .2s ease;
    }
    .modal-top-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 6px;
      padding: 12px 14px 0;
    }
    .modal-inner { padding: 8px 28px 28px; }
    .modal-close {
      background: #f0ede6; border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer;
      font-size: 18px; line-height: 30px; text-align: center; color: #555;
      flex-shrink: 0;
    }
    .modal-edit-btn {
      background: #f0ede6; border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer;
      font-size: 16px; line-height: 30px; text-align: center; color: #555;
      order: -1; flex-shrink: 0;
    }
    .modal-edit-btn:hover, .modal-close:hover { background: #e2ddd4; }
    .modal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px 12px; gap: 8px;
    }
    .modal-nav-btn {
      background: #f0ede6; border: none; border-radius: 8px;
      padding: 5px 14px; cursor: pointer; font-size: 13px; color: #444;
      transition: background .15s;
    }
    .modal-nav-btn:hover:not(:disabled) { background: #e2ddd4; }
    .modal-nav-btn:disabled { opacity: .4; cursor: default; }
    .modal-nav-pos { font-size: 12px; color: #999; }
    .modal-header { display: flex; gap: 20px; margin-bottom: 16px; }
    .modal-thumb { width: 96px; flex-shrink: 0; border-radius: 8px; object-fit: cover; align-self: flex-start; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 18px; color: #2d5016; line-height: 1.3; margin-bottom: 8px; }
    .modal-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge-lang { background: #2d5016; color: #fff; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .badge-folder { background: #f0ede6; color: #666; font-size: 12px; padding: 3px 9px; border-radius: 20px; }
    .modal-summary { font-size: 14px; color: #444; line-height: 1.7; margin: 14px 0; }
    .modal-meta { font-size: 13px; color: #666; line-height: 2; border-top: 1px solid #f0ede6; padding-top: 12px; margin-top: 4px; }
    .modal-meta strong { color: #444; }
    .modal-dl-btn {
      display: inline-block; margin-top: 14px;
      background: #2d5016; color: #fff;
      border-radius: 10px; padding: 10px 22px;
      font-size: 14px; font-weight: 700; text-decoration: none;
      transition: background .15s;
    }
    .modal-dl-btn:hover { background: #3d6a1e; }

    /* ── Personal Editor (modal) ────────────────────────────────── */
    .personal-editor { border-top: 1px solid #f0ede6; padding-top: 14px; margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
    .personal-row { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .personal-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; min-width: 80px; padding-top: 4px; flex-shrink: 0; }
    .personal-review-row { flex-direction: column; gap: 6px; }
    .personal-review-row .personal-label { padding-top: 0; }
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .status-btn {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      border: 1px solid #d8d6d0; background: #f9f8f5; cursor: pointer;
      color: #555; transition: all .1s;
    }
    .status-btn:hover { border-color: #2d5016; color: #2d5016; }
    .status-btn.status-active { background: #2d5016; color: #fff; border-color: #2d5016; }
    .star-rating { display: flex; gap: 2px; }
    .star-btn {
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: #ddd; padding: 0 2px; transition: color .1s;
    }
    .star-btn:hover { color: #c5913e; }
    .star-btn.star-active { color: #c5913e; }
    .score-filter { display: flex; gap: 2px; }
    .review-input {
      width: 100%; border: 1px solid #d8d6d0; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      resize: vertical; color: #333; background: #fafaf8;
    }
    .review-input:focus { outline: none; border-color: #2d5016; }
    .save-btn {
      align-self: flex-end; padding: 8px 22px;
      background: #2d5016; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .save-btn:hover:not(:disabled) { background: #3d6a1e; }
    .save-btn:disabled { opacity: .7; cursor: default; }
    /* toggle switch */
    .toggle-wrap { display: flex; align-items: center; cursor: pointer; }
    .toggle-wrap input { display: none; }
    .toggle-track {
      width: 36px; height: 20px; background: #ccc; border-radius: 10px;
      position: relative; transition: background .2s;
    }
    .toggle-wrap input:checked + .toggle-track { background: #2d5016; }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .toggle-wrap input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }

    /* ── Metadata Editor (modal) ────────────────────────────────── */
    .edit-meta-btn {
      background: none; border: 1px solid #d8d6d0; border-radius: 8px;
      padding: 5px 12px; font-size: 12px; color: #888; cursor: pointer;
      margin: 8px 0; transition: all .1s;
    }
    .edit-meta-btn:hover { border-color: #2d5016; color: #2d5016; }
    .meta-editor { border-top: 1px solid #f0ede6; padding-top: 14px; margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; }
    .meta-input {
      border: 1px solid #d8d6d0; border-radius: 8px; padding: 7px 12px;
      font-size: 14px; font-family: inherit; color: #222;
    }
    .meta-input:focus { outline: none; border-color: #2d5016; }
    .meta-textarea {
      border: 1px solid #d8d6d0; border-radius: 8px; padding: 8px 12px;
      font-size: 13px; font-family: inherit; color: #333; resize: vertical;
    }
    .meta-textarea:focus { outline: none; border-color: #2d5016; }
    .meta-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .cancel-btn {
      padding: 8px 16px; border: 1px solid #d8d6d0; border-radius: 8px;
      background: #fff; color: #666; font-size: 14px; cursor: pointer;
      transition: background .1s;
    }
    .cancel-btn:hover { background: #f0ede6; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f0ede6; border-radius: 20px;
      padding: 3px 10px; font-size: 12px; color: #444;
    }
    .chip-remove { background: none; border: none; cursor: pointer; color: #999; font-size: 14px; line-height: 1; padding: 0; }
    .chip-remove:hover { color: #c0392b; }
    .chip-input-row { display: flex; gap: 6px; margin-top: 4px; }
    .chip-input { flex: 1; border: 1px solid #d8d6d0; border-radius: 8px; padding: 5px 10px; font-size: 13px; font-family: inherit; }
    .chip-input:focus { outline: none; border-color: #2d5016; }
    .chip-add-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid #2d5016; background: #fff; color: #2d5016; font-size: 16px; cursor: pointer; }
    .chip-add-btn:hover { background: #2d5016; color: #fff; }

    /* ── Skeleton ────────────────────────────────────────────────── */
    .skeleton { background: #e8e6e0; border-radius: 12px; animation: pulse 1.4s ease-in-out infinite; }

    /* ── MOBILE ─────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      .header-row1 { padding: 10px 14px; gap: 8px; }
      .header-logo { font-size: 16px; }
      .header-search-wrap { display: none; }
      .header-row2 { display: block; padding: 0 14px 10px; }
      .filter-toggle { display: inline-flex; }
      .sidebar { display: none; }
      .layout { flex-direction: column; }
      .main { padding: 14px 12px 40px; }
      .book-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
      .modal-inner { padding: 18px; }
      .modal-header { flex-direction: column; }
      .modal-thumb { width: 100%; max-height: 220px; object-fit: contain; }
      .search-input { background: rgba(255,255,255,.2); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
