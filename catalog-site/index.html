<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Catalog</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%236b4226'/%3E%3Crect x='7' y='6' width='13' height='20' rx='2' fill='%23c5913e'/%3E%3Crect x='8' y='7' width='11' height='18' rx='1' fill='%23f5f0e8'/%3E%3Crect x='10' y='10' width='7' height='1.5' rx='.5' fill='%236b4226'/%3E%3Crect x='10' y='13' width='7' height='1.5' rx='.5' fill='%236b4226'/%3E%3Crect x='10' y='16' width='5' height='1.5' rx='.5' fill='%236b4226'/%3E%3Crect x='21' y='6' width='3' height='20' rx='1' fill='%23a07030'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6b4226;
      --primary-dark: #4a2c14;
      --primary-hover: #7d5030;
      --accent: #c5913e;
      --accent-hover: #b07c2e;
      --bg: #f2ece4;
      --bg-card: #fff;
      --bg-subtle: #f7f1ea;
      --bg-hover: #ede6dc;
      --border: #ddd6cb;
      --border-light: #e8e2d9;
      --text: #2a2018;
      --text-mid: #5a4a3a;
      --text-muted: #9a8878;
    }
    [data-theme="dark"] {
      --bg: #1c1710;
      --bg-card: #26211a;
      --bg-subtle: #211c15;
      --bg-hover: #2d2720;
      --border: #3d3428;
      --border-light: #302820;
      --text: #e8e0d4;
      --text-mid: #b0a090;
      --text-muted: #786860;
    }
    body { font-family: 'Source Sans 3', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Header ─────────────────────────────────────────────────── */
    .site-header {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-row1 {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 24px;
    }
    .header-logo {
      font-family: 'Cinzel', serif;
      font-size: 19px; font-weight: 700;
      letter-spacing: .5px; white-space: nowrap;
      flex-shrink: 0;
    }
    .header-search-wrap { flex: 1; min-width: 0; }
    .header-row2 { display: none; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout { display: flex; gap: 0; max-width: 1440px; margin: 0 auto; }
    .sidebar {
      width: 248px; flex-shrink: 0;
      padding: 20px 16px 40px;
      border-right: 1px solid var(--border);
      min-height: calc(100vh - 56px);
      background: var(--bg-subtle);
    }
    .main { flex: 1; min-width: 0; padding: 20px 24px 40px; }

    /* ── Footer ─────────────────────────────────────────────────── */
    .site-footer {
      background: var(--primary-dark); color: rgba(255,255,255,.6);
      text-align: center; padding: 12px 24px;
      font-size: 12px; display: flex; justify-content: center;
      align-items: center; gap: 16px;
    }
    .footer-version { color: rgba(255,255,255,.4); font-size: 11px; }

    /* ── Toolbar ────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar-count { font-size: 13px; color: var(--text-muted); }
    .sort-wrap { display: flex; align-items: center; gap: 8px; }
    .sort-label { font-size: 13px; color: var(--text-mid); }
    .sort-select {
      font-size: 13px; padding: 5px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-card); cursor: pointer;
      color: var(--text);
    }

    /* ── Book Grid ──────────────────────────────────────────────── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
      gap: 16px;
    }
    .book-card {
      background: var(--bg-card); border-radius: 12px;
      border: 1px solid var(--border-light);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      cursor: pointer; text-align: left;
      transition: box-shadow .15s, transform .15s;
      overflow: hidden;
      display: flex; flex-direction: column;
      animation: fadeIn .2s ease;
    }
    .book-card:hover { box-shadow: 0 4px 16px rgba(107,66,38,.16); transform: translateY(-2px); }
    .book-card:active { transform: translateY(0); }
    .card-thumb-wrap { position: relative; }
    .card-thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
    .card-lang {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.6); color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 6px; border-radius: 4px;
    }
    .card-score-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(74,44,20,.8); color: var(--accent);
      font-size: 13px; letter-spacing: 1px;
      padding: 6px 8px; text-align: center;
      opacity: 0; transition: opacity .18s ease;
      pointer-events: none;
    }
    .card-thumb-wrap:hover .card-score-overlay { opacity: 1; }
    .card-body { padding: 10px 10px 8px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-title { font-size: 13px; font-weight: 600; line-height: 1.3; color: var(--text); }
    .card-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-top: auto; }

    /* ── Tag Pills ──────────────────────────────────────────────── */
    .tag-pill {
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; white-space: nowrap;
    }
    /* System: brown (primary) */
    .tag-system { background: var(--primary); color: #fff; }
    /* Category: teal */
    .tag-category { background: #2a5c52; color: #fff; }
    /* Genre: slate-blue */
    .tag-genre { background: #3d4f7a; color: #fff; }
    /* Custom: warm gray */
    .tag-custom { background: #7a6858; color: #fff; }
    .card-pages { font-size: 11px; color: var(--text-muted); margin-left: auto; }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar-section { margin-bottom: 16px; }
    .sidebar-heading {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px;
      display: block;
    }
    .sidebar-heading-btn {
      width: 100%; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 0; margin-bottom: 6px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); text-align: left;
    }
    .sidebar-heading-btn:hover { color: var(--primary); }
    .sidebar-heading-caret { font-size: 9px; }
    .facet-item {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 6px; cursor: pointer; font-size: 13px;
      border-radius: 6px; transition: background .1s;
    }
    .facet-item:hover { background: var(--bg-hover); }
    .facet-item input { accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
    .facet-name { flex: 1; color: var(--text-mid); }
    .facet-count { font-size: 11px; color: var(--text-muted); }
    .facet-active .facet-name { color: var(--primary); font-weight: 600; }
    .facet-excluded { opacity: .85; }
    .facet-excluded .facet-name { color: #b33; font-weight: 600; text-decoration: line-through; }
    .facet-excluded input { accent-color: #b33; }
    .facet-exclude-icon { font-size: 10px; color: #b33; font-weight: 700; }
    .sidebar-reset {
      font-size: 12px; padding: 4px 10px; border-radius: 6px;
      background: var(--accent); color: #fff;
      border: none; cursor: pointer; font-weight: 600;
      transition: background .15s; white-space: nowrap; flex-shrink: 0;
    }
    .sidebar-reset:hover { background: var(--accent-hover); }
    .sidebar-random-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 7px; cursor: pointer;
      font-size: 14px; color: var(--text-mid); transition: all .15s;
    }
    .sidebar-random-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .sidebar-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }

    /* ── Indexing Panel (header-native) ─────────────────────────── */
    .index-btn {
      padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 700; font-size: 13px; white-space: nowrap;
      background: var(--accent); color: #fff;
      transition: background .15s;
    }
    .index-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .index-btn:disabled { background: rgba(255,255,255,.2); color: rgba(255,255,255,.7); cursor: default; }
    .index-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
    .index-phase { font-size: 11px; color: rgba(255,255,255,.7); text-align: center; }
    .index-bar-track { height: 3px; background: rgba(255,255,255,.25); border-radius: 2px; overflow: hidden; }
    .index-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

    /* ── Filter toggle (mobile) ─────────────────────────────────── */
    .filter-toggle {
      display: none; align-items: center; gap: 6px;
      background: rgba(255,255,255,.15); color: #fff;
      border: 1px solid rgba(255,255,255,.3); border-radius: 8px;
      padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 300;
    }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 288px; background: var(--bg); z-index: 301;
      padding: 0; overflow-y: auto;
      box-shadow: 4px 0 32px rgba(0,0,0,.2);
    }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      background: var(--primary); color: #fff;
    }
    .drawer-title { font-family: 'Cinzel', serif; font-size: 15px; }
    .drawer-close {
      background: none; border: none; color: #fff; font-size: 22px;
      cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .drawer-body { padding: 16px; }

    /* ── Pagination ──────────────────────────────────────────────── */
    .pagination { display: flex; align-items: center; gap: 8px; justify-content: center; padding: 16px 0 8px; }
    .page-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-card); cursor: pointer; font-size: 13px; color: var(--text-mid);
      transition: background .1s;
    }
    .page-btn:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--primary); }
    .page-btn:disabled { color: #ccc; cursor: default; }
    .page-info { font-size: 13px; color: var(--text-muted); min-width: 80px; text-align: center; }

    /* ── Search ─────────────────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 8px 36px 8px 14px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.15); color: #fff;
      font-size: 14px; outline: none;
      transition: background .15s, border-color .15s;
    }
    .search-input::placeholder { color: rgba(255,255,255,.6); }
    .search-input:focus { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.7); font-size: 18px; line-height: 1;
    }

    /* ── Modal ───────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: flex-start; justify-content: center;
      z-index: 400; padding: 40px 16px 16px;
      overflow-y: auto;
    }
    .modal-box {
      background: var(--bg-card); border-radius: 16px;
      max-width: 640px; width: 100%;
      position: relative;
      animation: fadeIn .2s ease;
      margin: auto;
    }
    /* Fixed top bar: always same height */
    .modal-top-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-light);
      border-radius: 16px 16px 0 0;
      background: var(--bg-subtle);
      min-height: 52px;
    }
    .modal-nav-arrow {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; width: 36px; height: 32px;
      cursor: pointer; font-size: 20px; line-height: 1;
      color: var(--primary); transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .modal-nav-arrow:hover:not(:disabled) { background: var(--primary); color: #fff; border-color: var(--primary); }
    .modal-nav-arrow:disabled { opacity: .3; cursor: default; }
    .modal-nav-pos { font-size: 12px; color: var(--text-muted); min-width: 48px; text-align: center; }
    .modal-action-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; width: 32px; height: 32px;
      cursor: pointer; font-size: 16px; line-height: 1;
      color: var(--text-mid); transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .modal-action-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .modal-close { font-size: 20px; }
    .modal-inner { padding: 16px 24px 28px; }
    .modal-header { display: flex; gap: 20px; margin-bottom: 16px; }
    .modal-thumb { width: 96px; flex-shrink: 0; border-radius: 8px; object-fit: cover; align-self: flex-start; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--primary); line-height: 1.3; margin-bottom: 8px; }
    .modal-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge-lang {
      background: var(--primary); color: #fff;
      font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    }
    .modal-summary { font-size: 14px; color: var(--text-mid); line-height: 1.7; margin: 14px 0; }
    .modal-meta { font-size: 13px; color: var(--text-muted); line-height: 1.8; border-top: 1px solid var(--border-light); padding-top: 12px; margin-top: 4px; }
    .modal-meta strong { color: var(--text-mid); }
    .modal-path {
      display: flex; align-items: baseline; gap: 8px;
      background: var(--bg-subtle); border-radius: 8px; padding: 6px 10px;
      margin-bottom: 4px;
    }
    .modal-path-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--text-muted); flex-shrink: 0;
    }
    .modal-path-value {
      font-size: 12px; color: var(--primary); font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .modal-dl-btn {
      display: inline-block; margin-top: 14px;
      background: var(--primary); color: #fff;
      border-radius: 10px; padding: 10px 22px;
      font-size: 14px; font-weight: 700; text-decoration: none;
      transition: background .15s;
    }
    .modal-dl-btn:hover { background: var(--primary-hover); }

    /* ── Personal Editor (modal) ────────────────────────────────── */
    .personal-editor { border-top: 1px solid var(--border-light); padding-top: 14px; margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
    .personal-row { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .personal-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); min-width: 80px; padding-top: 4px; flex-shrink: 0; }
    .personal-review-row { flex-direction: column; gap: 6px; }
    .personal-review-row .personal-label { padding-top: 0; }
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .status-btn {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg-subtle); cursor: pointer;
      color: var(--text-mid); transition: all .1s;
    }
    .status-btn:hover { border-color: var(--primary); color: var(--primary); }
    .status-btn.status-active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .star-rating { display: flex; gap: 2px; }
    .star-btn {
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: #ddd; padding: 0 2px; transition: color .1s;
    }
    .star-btn:hover { color: var(--accent); }
    .star-btn.star-active { color: var(--accent); }
    .score-filter { display: flex; gap: 2px; }
    .review-input {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      resize: vertical; color: var(--text); background: var(--bg-subtle);
    }
    .review-input:focus { outline: none; border-color: var(--primary); }
    .save-btn {
      align-self: flex-end; padding: 8px 22px;
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .save-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .save-btn:disabled { opacity: .7; cursor: default; }
    /* toggle switch */
    .toggle-wrap { display: flex; align-items: center; cursor: pointer; }
    .toggle-wrap input { display: none; }
    .toggle-track {
      width: 36px; height: 20px; background: #ccc; border-radius: 10px;
      position: relative; transition: background .2s;
    }
    .toggle-wrap input:checked + .toggle-track { background: var(--primary); }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .toggle-wrap input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }

    /* ── Metadata Editor (modal) ────────────────────────────────── */
    .meta-editor { border-top: 1px solid var(--border-light); padding-top: 14px; margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); }
    .meta-input {
      border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px;
      font-size: 14px; font-family: inherit; color: var(--text);
    }
    .meta-input:focus { outline: none; border-color: var(--primary); }
    .meta-textarea {
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
      font-size: 13px; font-family: inherit; color: var(--text-mid); resize: vertical;
    }
    .meta-textarea:focus { outline: none; border-color: var(--primary); }
    .meta-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .cancel-btn {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-card); color: var(--text-mid); font-size: 14px; cursor: pointer;
      transition: background .1s;
    }
    .cancel-btn:hover { background: var(--bg-hover); }
    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg-hover); border-radius: 20px;
      padding: 3px 10px; font-size: 12px; color: var(--text-mid);
    }
    .chip-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; padding: 0; }
    .chip-remove:hover { color: #b33; }
    .chip-input-row { display: flex; gap: 6px; margin-top: 4px; }
    .chip-input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 13px; font-family: inherit; }
    .chip-input:focus { outline: none; border-color: var(--primary); }
    .chip-add-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid var(--primary); background: var(--bg-card); color: var(--primary); font-size: 16px; cursor: pointer; }
    .chip-add-btn:hover { background: var(--primary); color: #fff; }

    /* ── Skeleton ────────────────────────────────────────────────── */
    .skeleton { background: var(--border); border-radius: 12px; animation: pulse 1.4s ease-in-out infinite; }

    /* ── Export ─────────────────────────────────────────────────── */
    .export-wrap { display: flex; gap: 4px; }
    .export-btn {
      font-size: 11px; padding: 4px 9px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-mid); text-decoration: none; white-space: nowrap;
      transition: all .12s;
    }
    .export-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--bg-subtle); }

    /* ── Dark Mode Toggle ───────────────────────────────────────── */
    .dark-toggle {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      border-radius: 8px; padding: 6px 10px; cursor: pointer;
      color: #fff; font-size: 15px; line-height: 1;
      transition: background .15s; flex-shrink: 0;
    }
    .dark-toggle:hover { background: rgba(255,255,255,.28); }

    /* ── MOBILE ─────────────────────────────────────────────────── */
    @media (max-width: 720px) {
